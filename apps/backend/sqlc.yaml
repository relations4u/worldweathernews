version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/storage/queries"
    schema: "internal/storage/schema.sql"
    gen:
      go:
        package: "db"
        out: "internal/storage/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false

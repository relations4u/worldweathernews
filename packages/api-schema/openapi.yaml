openapi: 3.1.0
info:
  title: worldweathernews API
  version: 0.1.0
  description: |
    HTTP API für worldweathernews.com. Alle Endpunkte unter `/api/v1/`.
  contact:
    name: worldweathernews
    url: https://worldweathernews.com
  license:
    name: TBD

servers:
  - url: http://api.localhost
    description: Local development
  - url: https://api.worldweathernews.com
    description: Production

tags:
  - name: system
    description: System-Endpunkte (Health, Metrics)
  - name: locations
    description: Geographische Orte

# Default: all endpoints are public. Override per operation if needed.
security: []

paths:
  /api/v1/ping:
    get:
      operationId: ping
      tags: [system]
      summary: Connectivity check
      responses:
        "200":
          description: pong
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"

  /api/v1/locations:
    get:
      operationId: searchLocations
      tags: [locations]
      summary: Search locations by query string
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 100
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: List of matching locations
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/Location"
                required: [results]
        "400":
          $ref: "#/components/responses/BadRequest"

components:
  schemas:
    PingResponse:
      type: object
      properties:
        message:
          type: string
          example: pong
        traceId:
          type: string
      required: [message, traceId]

    Location:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        timezone:
          type: string
          description: IANA timezone, e.g. Europe/Berlin
      required: [id, name, countryCode, latitude, longitude]

    Problem:
      description: |
        Problem details object as per RFC 7807.
      type: object
      properties:
        type:
          type: string
          format: uri
          default: about:blank
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
        traceId:
          type: string
      required: [title, status]

  responses:
    BadRequest:
      description: Bad request
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    InternalServerError:
      description: Server error
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

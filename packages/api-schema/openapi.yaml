openapi: 3.1.0
info:
  title: worldweathernews API
  version: 0.1.0
  description: |
    HTTP API für worldweathernews.com. Alle Endpunkte unter `/api/v1/`.
  contact:
    name: worldweathernews
    url: https://worldweathernews.com
  license:
    name: TBD

servers:
  - url: http://api.localhost
    description: Local development
  - url: https://api.worldweathernews.com
    description: Production

tags:
  - name: system
    description: System-Endpunkte (Health, Metrics)
  - name: locations
    description: Geographische Orte
  - name: weather
    description: Wetterdaten (aktuelle Werte und Vorhersagen)

# Default: all endpoints are public. Override per operation if needed.
security: []

paths:
  /api/v1/ping:
    get:
      operationId: ping
      tags: [system]
      summary: Connectivity check
      responses:
        "200":
          description: pong
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"

  /api/v1/locations:
    get:
      operationId: listLocations
      tags: [locations]
      summary: List all active locations
      responses:
        "200":
          description: List of active locations
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/Location"
                  attribution:
                    type: string
                required: [results, attribution]

  /api/v1/locations/{slug}:
    get:
      operationId: getLocationDetail
      tags: [locations, weather]
      summary: Get location with latest observation and 24h-forecast
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
            minLength: 1
            maxLength: 100
      responses:
        "200":
          description: Location detail mit current und forecast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationDetail"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  schemas:
    PingResponse:
      type: object
      properties:
        message:
          type: string
          example: pong
        traceId:
          type: string
      required: [message, traceId]

    Location:
      type: object
      properties:
        id:
          type: integer
          format: int64
        slug:
          type: string
          pattern: "^[a-z0-9-]+$"
          description: URL-safe key, z.B. "potsdam"
        name:
          type: string
        country:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        timezone:
          type: string
          description: IANA timezone, z.B. Europe/Berlin
        source:
          type: string
          description: Datenquelle, z.B. "open-meteo"
      required: [id, slug, name, country, latitude, longitude, timezone, source]

    Observation:
      type: object
      description: Eine Messung (current oder historisch).
      properties:
        observedAt:
          type: string
          format: date-time
        temperature:
          type: number
          description: Temperatur in °C (2 m über Grund). Fehlt, wenn Quelle null liefert.
        precipitation:
          type: number
          description: Niederschlag in mm. Fehlt, wenn Quelle null liefert.
        windSpeed:
          type: number
          description: Windgeschwindigkeit in km/h (10 m über Grund). Fehlt, wenn Quelle null liefert.
        windDirection:
          type: integer
          minimum: 0
          maximum: 360
          description: Windrichtung in Grad (0 = N, 90 = O). Fehlt, wenn Quelle null liefert.
        source:
          type: string
        fetchedAt:
          type: string
          format: date-time
      required: [observedAt, source, fetchedAt]

    ForecastEntry:
      type: object
      description: Ein stündlicher Vorhersage-Datenpunkt.
      properties:
        forecastFor:
          type: string
          format: date-time
        temperature:
          type: number
        precipitation:
          type: number
        windSpeed:
          type: number
        windDirection:
          type: integer
          minimum: 0
          maximum: 360
        runAt:
          type: string
          format: date-time
          description: Zeitpunkt des Forecast-Runs (alle Einträge eines Calls teilen dasselbe runAt).
      required: [forecastFor, runAt]

    LocationDetail:
      type: object
      properties:
        location:
          $ref: "#/components/schemas/Location"
        current:
          $ref: "#/components/schemas/Observation"
          description: Letzte Messung. Fehlt, wenn noch keine Beobachtung vorliegt.
        forecast:
          type: array
          items:
            $ref: "#/components/schemas/ForecastEntry"
          description: Stündliche Forecast-Einträge für die nächsten 24 h (kann leer sein).
        attribution:
          type: string
      required: [location, forecast, attribution]

    Problem:
      description: |
        Problem details object as per RFC 7807.
      type: object
      properties:
        type:
          type: string
          format: uri
          default: about:blank
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
        traceId:
          type: string
      required: [title, status]

  responses:
    BadRequest:
      description: Bad request
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    InternalServerError:
      description: Server error
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

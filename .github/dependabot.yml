version: 2
updates:
  # Go modules — Backend
  - package-ecosystem: gomod
    directory: /apps/backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # npm — Frontend
  - package-ecosystem: npm
    directory: /apps/frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # pip — Python Workers
  - package-ecosystem: pip
    directory: /apps/pyworkers
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
      include: scope

  # Docker
  #
  # Base-Image-Major/Minor-Bumps für die Sprach-Toolchains (golang, node,
  # python) sind bewusst geblockt — CLAUDE.md verlangt strikte Pins
  # (Go 1.25, Node 22, Python 3.12), die in vier Quellen zugleich
  # mitgezogen werden müssen (go.mod, .mise.toml, CI-Workflows, Dockerfile).
  # Eine isolierte Dockerfile-FROM-Bump-PR wäre sonst nur Lärm. Wenn ein
  # Toolchain-Upgrade ansteht, ist es ein bewusster Maintainer-Pass über
  # alle vier Quellen — siehe „Wie Versions-Updates ablaufen" in CLAUDE.md.
  # Patch-Updates des Base-Tags und Bumps anderer FROM-Refs (z. B.
  # distroless) bleiben offen.
  - package-ecosystem: docker
    directory: /apps/backend
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "golang"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"

  - package-ecosystem: docker
    directory: /apps/frontend
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "node"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"

  - package-ecosystem: docker
    directory: /apps/pyworkers
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "python"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"

  - package-ecosystem: docker
    directory: /apps/cms-auth
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "golang"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"

name: Security Scan

on:
  schedule:
    # Jeden Montag 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "**/go.mod"
      - "**/go.sum"
      - "**/package.json"
      - "**/pnpm-lock.yaml"
      - "**/pyproject.toml"
      - "**/uv.lock"
      - "**/Dockerfile"

permissions:
  contents: read

jobs:
  trivy-fs:
    name: Trivy filesystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      # SARIF as artifact instead of code-scanning upload: this repo is
      # private and GitHub Advanced Security is not enabled, so the
      # github/codeql-action/upload-sarif endpoint returns 403. Same
      # pattern as the Trivy step in release.yml. Switch back to the
      # codeql-action upload if/when GHAS is enabled or the repo is made
      # public.
      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-fs-sarif
          path: trivy-fs.sarif
          retention-days: 30

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/backend/go.mod
          cache-dependency-path: apps/backend/go.sum
      - name: Run govulncheck
        working-directory: apps/backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  pnpm-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: "9"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # --prod skips devDependencies (e.g. @redocly/cli pulling in
      # vulnerable fast-xml-parser / fast-uri) that are not part of the
      # production runtime. Runtime risk is what we want to gate on.
      - run: pnpm audit --audit-level=high --prod

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pyworkers
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "apps/pyworkers/uv.lock"
      - run: uv sync --frozen
      - run: uv run pip-audit

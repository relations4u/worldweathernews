name: Security Scan

# - Cron: Mo 06:00 UTC für regelmäßige Audits
# - Push auf main bei Lockfile-Änderungen
# - Manuell via workflow_dispatch
#
# Hinweis Trivy SARIF-Upload: in privaten Repos ohne GitHub Advanced Security
# schlägt der Upload fehl — wir setzen continue-on-error, damit der Job grün
# bleibt. Findings stehen weiterhin im Job-Log und in den PR-Annotations.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "**/go.mod"
      - "**/go.sum"
      - "**/pnpm-lock.yaml"
      - "**/uv.lock"

permissions:
  contents: read
  security-events: write

jobs:
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
        continue-on-error: true

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/backend/go.mod
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd apps/backend && govulncheck ./...

  pnpm-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - name: Audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Audit
        working-directory: apps/pyworkers
        run: |
          uv pip compile pyproject.toml -o /tmp/requirements.txt
          uv pip install --system pip-audit
          pip-audit -r /tmp/requirements.txt
        continue-on-error: true

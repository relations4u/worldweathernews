name: CI Backend

on:
  pull_request:
    paths:
      - "apps/backend/**"
      - "packages/api-schema/**"
      - ".github/workflows/ci-backend.yml"
  push:
    branches:
      - main
    paths:
      - "apps/backend/**"
      - "packages/api-schema/**"
      - ".github/workflows/ci-backend.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"
  GOLANGCI_LINT_VERSION: "v2.12.1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/backend/go.sum

      - uses: golangci/golangci-lint-action@v8
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: apps/backend
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: wwn
          POSTGRES_PASSWORD: wwn
          POSTGRES_DB: wwn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/backend/go.sum

      - name: Run tests
        working-directory: apps/backend
        env:
          WWN_DATABASE_URL: postgres://wwn:wwn@localhost:5432/wwn_test?sslmode=disable
          WWN_REDIS_URL: redis://localhost:6379/0
        run: go test -race -cover -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/backend/coverage.out
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/backend/go.sum

      - name: Build
        working-directory: apps/backend
        env:
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags "-s -w" -o bin/api ./cmd/api
          ls -la bin/

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: apps/backend/bin/api
          retention-days: 3

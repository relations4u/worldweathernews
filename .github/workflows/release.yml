name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write # cosign keyless via Sigstore OIDC
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  meta:
    name: Meta
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      build_date: ${{ steps.meta.outputs.build_date }}
    steps:
      - id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: backend
            context: apps/backend
            build_args: ""
          - name: frontend
            context: apps/frontend
            # SvelteKit's $env/static/public is BUILD-time only — runtime ENV
            # in compose has no effect. Without this, the JS bundle ends up
            # with the Dockerfile default http://api.localhost.
            build_args: |
              PUBLIC_API_BASE_URL=https://api.research.worldweathernews.com
          - name: pyworkers
            context: apps/pyworkers
            build_args: ""
          - name: cms-auth
            context: apps/cms-auth
            build_args: ""
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metadata
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/wwn-${{ matrix.service.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
          build-args: |
            VERSION=${{ needs.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ needs.meta.outputs.build_date }}
            ${{ matrix.service.build_args }}
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless via Sigstore)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.docker_meta.outputs.tags }}
        run: |
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/wwn-${{ matrix.service.name }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.service.name }}.spdx.json

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/wwn-${{ matrix.service.name }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.service.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

      # SARIF as artifact instead of code-scanning upload: this repo is
      # private and GitHub Advanced Security is not enabled, so the
      # github/codeql-action/upload-sarif endpoint returns 403. Switch
      # back to that action if/when GHAS is enabled or the repo is made public.
      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-sarif-${{ matrix.service.name }}
          path: trivy-${{ matrix.service.name }}.sarif

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sbom-${{ matrix.service.name }}
          path: sbom-${{ matrix.service.name }}.spdx.json

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [meta, build]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download SBOMs
        uses: actions/download-artifact@v4
        with:
          pattern: sbom-*
          path: sboms/
          merge-multiple: true

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.meta.outputs.version }}
          name: v${{ needs.meta.outputs.version }}
          body: |
            ${{ steps.changelog.outputs.content }}

            ## Container Images

            ```
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/wwn-backend:${{ needs.meta.outputs.version }}
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/wwn-frontend:${{ needs.meta.outputs.version }}
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/wwn-pyworkers:${{ needs.meta.outputs.version }}
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/wwn-cms-auth:${{ needs.meta.outputs.version }}
            ```

            All images are signed with cosign (keyless via Sigstore). SBOMs are
            attached as release assets. Trivy scan results are uploaded to the
            repository's code-scanning tab.
          files: |
            sboms/*.spdx.json
          generate_release_notes: false
          prerelease: ${{ contains(needs.meta.outputs.version, '-') }}

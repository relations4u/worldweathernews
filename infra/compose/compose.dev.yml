# Lokaler Dev-Stack für worldweathernews.com
#
# Wird über Top-Level compose.yml via `include:` eingebunden.
# Start: `make dev` (kopiert auch .env aus .env.example, falls fehlt).
#
# Sicherheits-Konventionen:
# - Datenbank- und Cache-Ports ausschließlich an 127.0.0.1 gebunden
#   (kein versehentlicher LAN-Zugriff im Dev-Setup).
# - Caddy ist die einzige Komponente mit öffentlich gebundenen Ports (80/443).

name: wwn

services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: wwn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wwn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: wwn
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wwn -d wwn"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - wwn-net

  redis:
    image: redis:7-alpine
    container_name: wwn-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wwn-net

  caddy:
    image: caddy:2-alpine
    container_name: wwn-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - mailhog
    networks:
      - wwn-net

  mailhog:
    image: mailhog/mailhog
    container_name: wwn-mailhog
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - wwn-net

networks:
  wwn-net:
    name: wwn-net
    driver: bridge

volumes:
  postgres_data:
    name: wwn_postgres_data
  caddy_data:
    name: wwn_caddy_data
  caddy_config:
    name: wwn_caddy_config

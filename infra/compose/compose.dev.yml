# Lokaler Dev-Stack für worldweathernews.com
#
# Wird über Top-Level compose.yml via `include:` eingebunden.
# Start: `make dev` (kopiert auch .env aus .env.example, falls fehlt).
#
# Sicherheits-Konventionen:
# - Datenbank- und Cache-Ports ausschließlich an 127.0.0.1 gebunden
#   (kein versehentlicher LAN-Zugriff im Dev-Setup).
# - Caddy ist die einzige Komponente mit öffentlich gebundenen Ports (80/443).

name: wwn

services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: wwn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wwn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: wwn
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wwn -d wwn"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - wwn-net

  redis:
    image: redis:7-alpine
    container_name: wwn-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wwn-net

  caddy:
    image: caddy:2-alpine
    container_name: wwn-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - mailhog
      - backend
      - frontend
    networks:
      - wwn-net

  mailhog:
    image: mailhog/mailhog
    container_name: wwn-mailhog
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - wwn-net

  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: dev
    container_name: wwn-backend
    restart: unless-stopped
    command: ["air"]
    working_dir: /src
    volumes:
      - ../../apps/backend:/src
      - go_mod_cache:/go/pkg/mod
    environment:
      WWN_DATABASE_URL: ${WWN_DATABASE_URL}
      WWN_REDIS_URL: ${WWN_REDIS_URL}
      WWN_LOGGING_LEVEL: ${WWN_LOG_LEVEL:-debug}
      WWN_LOGGING_FORMAT: ${WWN_LOG_FORMAT:-json}
      WWN_ENVIRONMENT: dev
      WWN_HTTP_PORT: "8080"
      WWN_OBSERVABILITY_TRACING_ENABLED: ${WWN_OBSERVABILITY_TRACING_ENABLED:-true}
      WWN_OBSERVABILITY_TRACING_ENDPOINT: ${WWN_OBSERVABILITY_TRACING_ENDPOINT:-tempo:4317}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - wwn-net

  frontend:
    image: node:22-alpine
    container_name: wwn-frontend
    restart: unless-stopped
    # node:22-alpine läuft default als uid=1000(node) und hat keine
    # Schreibrechte auf /usr/local/lib/node_modules. Für den Dev-Container
    # läuft alles als root, damit pnpm via npm-global installiert werden
    # kann. Production-Image (Dockerfile, Stage `runner`) nutzt einen
    # eigenen non-root user.
    user: "0:0"
    command:
      - sh
      - -c
      - |
        set -e
        if ! command -v pnpm >/dev/null; then
          npm install -g pnpm@11.0.3
        fi
        pnpm install --frozen-lockfile
        pnpm dev --host 0.0.0.0
    working_dir: /app
    volumes:
      - ../../apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      PUBLIC_API_BASE_URL: http://api.localhost
      HOST: 0.0.0.0
      PORT: "5173"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
    expose:
      - "5173"
    networks:
      - wwn-net

  pyworkers:
    image: python:3.12-slim
    container_name: wwn-pyworkers
    restart: unless-stopped
    # uv ist nicht im python:3.12-slim-Image. Beim Start via pip installieren
    # (einmalig in den .venv-Pfad, dann persistent über das Volume) und
    # den Worker mit watchfiles für Hot-Reload starten.
    command:
      - sh
      - -c
      - |
        set -e
        if ! command -v uv >/dev/null; then
          pip install --no-cache-dir --root-user-action=ignore uv
        fi
        uv sync
        exec uv run watchfiles --filter python "python -m pyworkers" pyworkers
    working_dir: /app
    volumes:
      - ../../apps/pyworkers:/app
      - pyworkers_venv:/app/.venv
    environment:
      WWN_PY_DATABASE_URL: ${WWN_PY_DATABASE_URL}
      WWN_PY_REDIS_URL: ${WWN_PY_REDIS_URL}
      WWN_PY_LOG_LEVEL: ${WWN_PY_LOG_LEVEL:-DEBUG}
      WWN_PY_LOG_FORMAT: ${WWN_PY_LOG_FORMAT:-json}
      WWN_PY_ENVIRONMENT: dev
      WWN_PY_HEARTBEAT_INTERVAL_SECONDS: "30"
      WWN_PY_METRICS_PORT: "9100"
      WWN_PY_TRACING_ENABLED: ${WWN_PY_TRACING_ENABLED:-true}
      WWN_PY_TRACING_ENDPOINT: ${WWN_PY_TRACING_ENDPOINT:-tempo:4317}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "9100"
    networks:
      - wwn-net

  # --- Monitoring-Stack (Profile `monitoring`) -------------------------------
  # Wird mit `make dev-full` oder `docker compose --profile monitoring up`
  # gestartet. `make dev` lässt diese Services bewusst aussen vor.

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: wwn-prometheus
    profiles: [monitoring]
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - wwn-net

  loki:
    image: grafana/loki:3.3.2
    container_name: wwn-loki
    profiles: [monitoring]
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ../monitoring/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - wwn-net

  promtail:
    image: grafana/promtail:3.3.2
    container_name: wwn-promtail
    profiles: [monitoring]
    restart: unless-stopped
    # Promtail braucht Read-Zugriff auf den Docker-Socket (Service-Discovery)
    # und auf die Container-Logs. user:root ist im Dev-Setup pragmatisch —
    # in Prod sollte stattdessen die docker-Group gesetzt werden.
    user: "0:0"
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ../monitoring/promtail/config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_data:/tmp
    depends_on:
      - loki
    networks:
      - wwn-net

  tempo:
    image: grafana/tempo:2.6.1
    container_name: wwn-tempo
    profiles: [monitoring]
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ../monitoring/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200" # Tempo HTTP
      - "127.0.0.1:4317:4317" # OTLP gRPC
      - "127.0.0.1:4318:4318" # OTLP HTTP
    networks:
      - wwn-net

  grafana:
    image: grafana/grafana:11.3.0
    container_name: wwn-grafana
    profiles: [monitoring]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - wwn-net

networks:
  wwn-net:
    name: wwn-net
    driver: bridge

volumes:
  postgres_data:
    name: wwn_postgres_data
  caddy_data:
    name: wwn_caddy_data
  caddy_config:
    name: wwn_caddy_config
  go_mod_cache:
    name: wwn_go_mod_cache
  frontend_node_modules:
    name: wwn_frontend_node_modules
  pyworkers_venv:
    name: wwn_pyworkers_venv
  prometheus_data:
    name: wwn_prometheus_data
  grafana_data:
    name: wwn_grafana_data
  loki_data:
    name: wwn_loki_data
  promtail_data:
    name: wwn_promtail_data
  tempo_data:
    name: wwn_tempo_data

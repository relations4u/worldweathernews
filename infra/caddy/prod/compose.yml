# Stand-alone Caddy-Stack für wwn-prod.
#
# Bewusst getrennt vom App-Compose-Stack (`infra/compose/compose.prod.yml`):
# unverfälschte Client-IPs durch network_mode: host, eigener Lifecycle, Caddy
# bleibt unangetastet wenn der App-Stack neu deployed wird.
#
# Persistente Daten (TLS-Zertifikate unter ./data, Admin-API-Cache unter
# ./config) liegen als Bind-Mount unter /srv/wwn/caddy/data und
# /srv/wwn/caddy/config. Erstmig­ration vom Docker-Named-Volume per
# `infra/deploy/migrate-caddy-bindmount.sh` (idempotent, einmalig). Backup
# vom Live-Stand: `tar czf - -C /srv/wwn/caddy/data .` — kein Umweg mehr
# durch /var/lib/docker/.

services:
  caddy:
    image: caddy:2-alpine
    container_name: wwn-caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data:/data
      - ./config:/config
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

# Stand-alone Caddy-Stack für wwn-prod — INTERNER HTTP-Router (Strategie R1).
#
# Öffentlicher Ingress + TLS sind nach `gate` umgezogen (sysadmin-Repo, ADR-0002).
# Dieser Caddy terminiert KEIN öffentliches TLS mehr: `auto_https off`, lauscht nur
# intern auf 10.100.100.70:80 (`default_bind` in der Caddyfile). gate reicht die
# WWN-Namen mit erhaltenem Host-Header hierher durch.
#
# `network_mode: host` bleibt nötig: nur so erreicht Caddy die App-Container auf
# 127.0.0.1:{3000,8080,8090} (Loopback-Bind unter /opt/wwn).
#
# Persistenz: ./data (Admin-API-Cache; öffentliche LE-Zertifikate liegen jetzt auf
# gate) und ./config als Bind-Mount unter /srv/wwn/caddy/. Backup vom Live-Stand:
# `tar czf - -C /srv/wwn/caddy/data .`.

services:
  caddy:
    image: caddy:2-alpine
    container_name: wwn-caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data:/data
      - ./config:/config
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(wwn-.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      - source_labels:
          ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
    pipeline_stages:
      - docker: {}
      # JSON-Logs (Backend slog, Pyworkers structlog) parsen.
      # Nicht-JSON-Zeilen scheitern still und behalten den Roh-Log-Body.
      - json:
          expressions:
            level: level
            time: time
            msg: msg
            trace_id: trace_id
            request_id: request_id
      - labels:
          level:
          trace_id:

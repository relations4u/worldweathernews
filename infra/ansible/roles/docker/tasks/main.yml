---
- name: Ensure docker apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download Docker apt signing key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Install docker engine and compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Enable and start docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Decrypt ghcr.env via sops lookup
  ansible.builtin.set_fact:
    _ghcr_env: "{{ lookup('community.sops.sops', secrets_dir + '/ghcr.env') }}"
  delegate_to: localhost
  become: false
  no_log: true

- name: Parse ghcr credentials from dotenv content
  # `community.sops.load_vars` würde nur YAML/JSON akzeptieren; unsere
  # ghcr.env ist im Dotenv-Format. Hier daher manuelles Parsen mit
  # regex_findall.
  ansible.builtin.set_fact:
    _ghcr_username: "{{ _ghcr_env | regex_findall('^GHCR_USERNAME=(.+)$', multiline=True) | first }}"
    _ghcr_token: "{{ _ghcr_env | regex_findall('^GHCR_TOKEN=(.+)$', multiline=True) | first }}"
  no_log: true

- name: Ensure deploy user docker config dir exists
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/.docker"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0700"

- name: Login to ghcr.io as deploy user
  community.docker.docker_login:
    registry_url: ghcr.io
    username: "{{ _ghcr_username }}"
    password: "{{ _ghcr_token }}"
    config_path: "/home/{{ deploy_user }}/.docker/config.json"
  become: true
  become_user: "{{ deploy_user }}"
  no_log: true

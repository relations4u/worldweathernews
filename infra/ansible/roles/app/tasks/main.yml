---
# Hinweis: Diese Rolle deployt NICHT den Caddy-Container. Caddy läuft in
# einem eigenständigen Stack unter /srv/wwn/caddy (siehe
# infra/deploy/deploy-caddy.sh). Der Caddy-Block in compose.prod.yml ist
# bewusst unbenutzt und wird in einer separaten PR entfernt.

- name: Ensure app directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0750"
  loop:
    - "{{ app_dir }}"
    - "{{ app_dir }}/postgres-init"
    - "{{ app_dir }}/migrations"

- name: Render compose.prod.yml with version pins
  ansible.builtin.template:
    src: compose.prod.yml.j2
    dest: "{{ app_dir }}/{{ docker_compose_file }}"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0640"

- name: Copy postgres-init scripts
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../compose/postgres-init/"
    dest: "{{ app_dir }}/postgres-init/"
    delete: true
    rsync_opts:
      - "--chmod=D0755,F0644"

- name: Stage goose migrations on host
  # Wird gleich per `docker cp` in den postgres-Container kopiert; deshalb
  # nicht direkt nach /opt/wwn — sondern in ein dediziertes Unterverzeichnis,
  # damit ein versehentliches `delete: true` die App-Konfig nicht trifft.
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../migrations/"
    dest: "{{ app_dir }}/migrations/"
    delete: true
    rsync_opts:
      - "--chmod=D0755,F0644"

- name: Decrypt SOPS env files into /opt/wwn/.env.<service>
  ansible.builtin.copy:
    content: "{{ lookup('community.sops.sops', secrets_dir + '/' + item.src) }}"
    dest: "{{ app_dir }}/.env.{{ item.name }}"
    owner: root
    group: "{{ deploy_user }}"
    mode: "0640"
  loop: "{{ secret_files }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true

- name: Pull container images
  community.docker.docker_compose_v2_pull:
    project_src: "{{ app_dir }}"
    files:
      - "{{ docker_compose_file }}"
  become: true
  become_user: "{{ deploy_user }}"

# === Migrations ====================================================
# Beim v0.4.0-Deploy am 12. Mai 2026 hat das fehlende `goose up` einen
# API-500 verursacht (relation "locations" does not exist) — siehe
# docs/runbook.md Szenario 13. Postgres exposed keinen Host-Port,
# darum läuft goose innerhalb des wwn-postgres-Containers gegen
# 127.0.0.1:5432 mit dem Container-internen POSTGRES_PASSWORD.

- name: Ensure goose binary on app host
  ansible.builtin.get_url:
    url: "https://github.com/pressly/goose/releases/download/v{{ goose_version }}/goose_linux_x86_64"
    dest: /usr/local/bin/goose
    mode: "0755"
    owner: root
    group: root

- name: Start data services (postgres, redis) before migrations
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    files:
      - "{{ docker_compose_file }}"
    services:
      - postgres
      - redis
    state: present
    pull: never
    wait: true
  become: true
  become_user: "{{ deploy_user }}"

- name: Apply database migrations via goose-in-postgres-container
  # Workaround spiegelt den manuellen Fix vom 12. Mai: goose-Binary und
  # Migrations werden per `docker cp` in den postgres-Container gestaged,
  # dort gegen 127.0.0.1 ausgeführt, anschliessend wieder entfernt.
  # POSTGRES_USER/PASSWORD/DB stammen aus der Container-Env (SOPS-Secret),
  # tauchen also nicht im Ansible-Log auf. `docker exec -u 0` ist nötig:
  # die timescaledb-ha:pg16-Image-Default-User ist `postgres`, der wegen
  # sticky-bit auf /tmp root-owned Files nicht löschen kann (per docker cp
  # gestaged). goose-Auth läuft über TCP+Password, also unabhängig vom
  # OS-User innerhalb des Containers.
  ansible.builtin.shell: |
    set -euo pipefail
    docker cp {{ app_dir }}/migrations wwn-postgres:/tmp/wwn-migrations
    docker cp /usr/local/bin/goose wwn-postgres:/tmp/goose
    docker exec -u 0 wwn-postgres bash -c '
      /tmp/goose -dir /tmp/wwn-migrations postgres \
        "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB}?sslmode=disable" \
        up
    '
    docker exec -u 0 wwn-postgres rm -rf /tmp/wwn-migrations /tmp/goose
  args:
    executable: /bin/bash
  # goose ist idempotent (no-op bei gleichem DB-Zustand); wir markieren den
  # Task trotzdem als changed, damit das Ansible-Reporting zeigt, dass die
  # Migration gelaufen ist.
  changed_when: true
  become: true
  become_user: "{{ deploy_user }}"

- name: Start full application stack
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    files:
      - "{{ docker_compose_file }}"
    state: present
    pull: never
    remove_orphans: true
  become: true
  become_user: "{{ deploy_user }}"

- name: Wait for backend health endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:8080/api/v1/ping"
    status_code: 200
  register: backend_health
  retries: 30
  delay: 2
  until: backend_health.status == 200

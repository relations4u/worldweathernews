# Managed by Ansible — common role.
#
# Ubuntu liefert chrony mit `makestep 1 3` aus: chrony stept das Wall-Clock
# nur in den ersten drei Messungen wenn der Offset > 1 s ist, danach wird
# nur noch geslewed. Bei Proxmox-VMs mit RTC-Drift nach Snapshots/Migration/
# Host-Reboot fuehrt das dazu, dass die Uhr stunden- oder tagelang
# auslaufen wuerde, bevor sie wieder stimmt.
#
# `makestep 1.0 -1` heisst: immer stepen, wenn Offset > 1.0 s ist, egal
# wie lange chrony schon laeuft. chrony validiert ohnehin gegen mehrere
# Quellen, bevor es einen Schritt ausfuehrt — das Risiko einer
# Fehlmessung ist gering, der Nutzen bei VM-Wiederanlauf hoch.
#
# Geschichte: am 9. Juni 2026 lag der Clock auf wwn-prod 9 Tage zurueck,
# weil chrony nach dem IP-Re-Konfig-Reboot nur noch geslewed hat.
makestep 1.0 -1

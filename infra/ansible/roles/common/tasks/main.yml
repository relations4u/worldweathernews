---
- name: Set hostname to inventory_hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Install baseline packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - ufw
      - fail2ban
      - unattended-upgrades
      - chrony
      - python3-passlib
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure deploy user exists
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups: "{{ deploy_user_groups }}"
    append: true
    shell: /bin/bash
    create_home: true
    state: present

- name: Authorize maintainer SSH keys for deploy user
  ansible.posix.authorized_key:
    user: "{{ deploy_user }}"
    key: "{{ item }}"
    state: present
  loop: "{{ maintainer_authorized_keys }}"

- name: Allow deploy user passwordless sudo for docker compose only
  ansible.builtin.copy:
    dest: /etc/sudoers.d/10-{{ deploy_user }}-docker
    content: |
      {{ deploy_user }} ALL=(root) NOPASSWD: /usr/bin/docker, /usr/local/bin/docker
    owner: root
    group: root
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s

- name: Configure SSH daemon
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config.d/10-wwn.conf
    owner: root
    group: root
    mode: "0644"
    validate: /usr/sbin/sshd -t -f %s
  notify: Reload sshd

- name: Configure unattended-upgrades (security only)
  ansible.builtin.template:
    src: unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/52unattended-upgrades-wwn
    owner: root
    group: root
    mode: "0644"

- name: Enable and start chrony
  ansible.builtin.systemd:
    name: chrony
    enabled: true
    state: started

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started

- name: Set UFW default policies
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Allow listed inbound ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment | default(omit) }}"
  loop: "{{ ufw_allowed_ports }}"

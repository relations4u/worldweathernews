global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: wwn
    env: production

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          host: wwn-mon

  - job_name: node-exporter-wwn-prod
    static_configs:
      - targets: ["10.100.100.70:9101"]
        labels:
          host: wwn-prod
          service: node-exporter

  # wwn-mon hat (bewusst) keinen monitoring-agent-Run — der dortige
  # monitoring-stack läuft mit eigenem Promtail. node-exporter für
  # wwn-mon wäre ein zusätzlicher Service im Stack-compose; bleibt
  # für Folge-PR offen, wenn wir Host-Metriken für wwn-mon brauchen.

  # Backend- und Pyworkers-Metrics auf wwn-prod. Beide binden ihre
  # Ports auf 0.0.0.0; UFW erlaubt sie nur aus dem Manager-LAN
  # (10.100.100.0/24, siehe common-Rolle, monitoring_scrape_ports).
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ["10.100.100.70:8080"]
        labels:
          host: wwn-prod
          service: backend
  - job_name: pyworkers
    static_configs:
      - targets: ["10.100.100.70:9100"]
        labels:
          host: wwn-prod
          service: pyworkers

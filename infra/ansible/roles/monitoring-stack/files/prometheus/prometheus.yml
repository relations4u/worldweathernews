global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: wwn
    env: production

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          host: wwn-mon

  - job_name: node-exporter-wwn-prod
    static_configs:
      - targets: ["10.100.100.21:9101"]
        labels:
          host: wwn-prod
          service: node-exporter

  - job_name: node-exporter-wwn-mon
    static_configs:
      - targets: ["10.100.100.22:9101"]
        labels:
          host: wwn-mon
          service: node-exporter

  # TODO: Backend- und Pyworkers-Metrics. Aktuell binden die Container ihre
  # Ports nur auf 127.0.0.1 (siehe app-Rolle compose.prod.yml.j2), also nicht
  # von wwn-mon erreichbar. Optionen:

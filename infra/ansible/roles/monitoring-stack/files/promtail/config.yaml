# Self-Monitoring von wwn-mon: pickt Logs der lokalen Monitoring-Container
# (Prometheus, Loki, Tempo, Grafana) und pusht zur lokalen Loki-Instanz.
#
# Container auf wwn-prod nutzen die monitoring-agent-Rolle und pushen dort
# direkt zu http://10.100.100.22:3100/loki/api/v1/push.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(wwn-.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      - source_labels:
          ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      - target_label: host
        replacement: wwn-mon
    pipeline_stages:
      - docker: {}

---
# Defaults für die monitoring-stack-Rolle. Werden in group_vars überschreibbar
# gemacht; hier nur die generischen Werte.

monitoring_app_dir: /opt/wwn/monitoring-stack

# Image-Pins identisch zum dev-Compose-Profile, damit Dashboards 1:1 passen.
monitoring_prometheus_image: prom/prometheus:v2.55.1
monitoring_loki_image: grafana/loki:3.3.2
monitoring_promtail_image: grafana/promtail:3.3.2
monitoring_tempo_image: grafana/tempo:2.6.1
monitoring_grafana_image: grafana/grafana:11.3.0

# Retention. Prom-TSDB hält per --storage.tsdb.retention.time=, Loki und Tempo
# per Config-File (siehe files/loki/local-config.yaml, files/tempo/tempo.yaml).
monitoring_prometheus_retention: "30d"

# Welche Ports sind zur Annahme von externen Pushes geöffnet.
# - Loki:3100 — Promtail-Agent auf wwn-prod pusht Logs hier rein.
# - Tempo OTLP:4317/4318 — Backend und Pyworkers exportieren Traces hier hin.
# UFW-Regeln dafür müssen separat in inventories/production/group_vars/mon.yml
# bzw. in der common-Rolle pro Hostgruppe gesetzt werden (siehe
# docs/backlog.md → Operations).
monitoring_external_loki_port: 3100
monitoring_external_otlp_grpc_port: 4317
monitoring_external_otlp_http_port: 4318

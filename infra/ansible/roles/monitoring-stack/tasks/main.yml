---
# Deployt den zentralen Observability-Stack auf wwn-mon: Prometheus, Loki,
# Tempo, Grafana, plus Promtail für das Self-Monitoring der wwn-mon-Container.
#
# Caddy läuft NICHT vor diesem Stack — Grafana ist nur intern erreichbar
# (127.0.0.1:3000), Zugriff via SSH-Tunnel oder VPN.

- name: Ensure monitoring-stack directory tree
  ansible.builtin.file:
    path: "{{ monitoring_app_dir }}/{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    # 0755 statt 0750: die Container laufen mit unterschiedlichen Nicht-deploy-
    # UIDs (Prometheus uid 65534, Loki/Tempo 10001, Grafana 472) und müssen
    # die Verzeichnisse traversieren können.
    mode: "0755"
  loop:
    - ""
    - prometheus
    - loki
    - promtail
    - tempo
    - grafana/provisioning/datasources
    - grafana/provisioning/dashboards
    - grafana/dashboards

- name: Copy service config files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ monitoring_app_dir }}/{{ item.dest }}"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    # 0644: nicht-sensitiver Config-Inhalt, muss von Container-Usern (uid != 1001)
    # lesbar sein. Geheime Werte gehen ausschließlich über die .env-Files (0640).
    mode: "0644"
  loop:
    - src: prometheus/prometheus.yml
      dest: prometheus/prometheus.yml
    - src: loki/local-config.yaml
      dest: loki/local-config.yaml
    - src: promtail/config.yaml
      dest: promtail/config.yaml
    - src: tempo/tempo.yaml
      dest: tempo/tempo.yaml
    - src: grafana/provisioning/datasources/datasources.yml
      dest: grafana/provisioning/datasources/datasources.yml
    - src: grafana/provisioning/dashboards/dashboards.yml
      dest: grafana/provisioning/dashboards/dashboards.yml
  loop_control:
    label: "{{ item.dest }}"
  # Single-File-Bind-Mounts hängen am Inode beim Container-Start. `copy`
  # macht atomic-rename → neuer Inode, Container liest weiterhin den alten.
  # Stack-Restart re-resolved die Bind-Mounts; Volumes (TSDB, Grafana-DB)
  # bleiben unangetastet. Gleiche Falle wie bei Caddy — siehe deploy-caddy.sh.
  notify: Restart monitoring stack

- name: Copy Grafana dashboards
  ansible.builtin.copy:
    src: grafana/dashboards/
    dest: "{{ monitoring_app_dir }}/grafana/dashboards/"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"

- name: Decrypt grafana.env via sops lookup
  ansible.builtin.set_fact:
    _grafana_env: "{{ lookup('community.sops.sops', secrets_dir + '/grafana.env') }}"
  delegate_to: localhost
  become: false
  no_log: true

- name: Parse grafana admin password from dotenv content
  # grafana.env ist Dotenv (KEY=VAL), nicht YAML — regex_findall liest das raus.
  ansible.builtin.set_fact:
    _grafana_admin_password: "{{ _grafana_env | regex_findall('^GRAFANA_ADMIN_PASSWORD=(.+)$', multiline=True) | first }}"
  no_log: true

- name: Write Grafana env file with admin password
  ansible.builtin.copy:
    content: |
      GF_SECURITY_ADMIN_PASSWORD={{ _grafana_admin_password }}
    dest: "{{ monitoring_app_dir }}/.env.grafana"
    owner: root
    group: "{{ deploy_user }}"
    mode: "0640"
  no_log: true

- name: Render compose.yml
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ monitoring_app_dir }}/compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0640"

- name: Pull container images
  community.docker.docker_compose_v2_pull:
    project_src: "{{ monitoring_app_dir }}"
    files: [compose.yml]
  become: true
  become_user: "{{ deploy_user }}"

- name: Start monitoring stack
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_app_dir }}"
    files: [compose.yml]
    state: present
    pull: never
    remove_orphans: true
  become: true
  become_user: "{{ deploy_user }}"

- name: Wait for Grafana health endpoint
  ansible.builtin.uri:
    url: http://127.0.0.1:3000/api/health
    status_code: 200
  register: grafana_health
  retries: 30
  delay: 2
  until: grafana_health.status == 200

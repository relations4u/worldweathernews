---
# Deployt node_exporter und promtail auf den App-Hosts. node_exporter
# wird Pull-basiert von Prometheus auf wwn-mon gescraped, promtail pusht
# Container-Logs zu Loki.
#
# Wird NICHT auf wwn-mon ausgeführt — der dortige monitoring-stack hat
# einen eigenen Promtail (für Self-Logging) und würde sonst beim
# Container-Namen `wwn-promtail` mit dem Agent kollidieren. Siehe
# `playbooks/site.yml` (`hosts: app`).

- name: Ensure monitoring-agent directory exists
  ansible.builtin.file:
    path: "{{ app_dir }}/monitoring-agent"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0750"

- name: Render monitoring-agent compose
  ansible.builtin.template:
    src: monitoring-agent-compose.yml.j2
    dest: "{{ app_dir }}/monitoring-agent/compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0640"

- name: Render promtail config
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: "{{ app_dir }}/monitoring-agent/promtail-config.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0640"

- name: Start monitoring-agent stack
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}/monitoring-agent"
    files: [compose.yml]
    state: present
    pull: missing
  become: true
  become_user: "{{ deploy_user }}"

---
# Defaults werden in group_vars/all.yml überschreibbar gehalten.
monitoring_central_host: 10.100.100.69
monitoring_loki_port: 3100

# node_exporter bindet auf einen abweichenden Port, damit auf wwn-prod kein
# Konflikt mit dem Pyworkers-Metrics-Port (:9100) entsteht. node_exporter läuft
# in `network_mode: host`, also direkt auf der Host-Adresse — Prometheus auf
# wwn-mon scraped 10.100.100.70:9101 bzw. 10.100.100.69:9101.
monitoring_prometheus_scrape_port: 9101

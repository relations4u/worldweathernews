---
# Production-Inventory für die Forschungs-Phase auf eigenem Proxmox-Host.
#
# Zwei Hosts:
#   wwn-prod  (10.100.100.70)  — Application-Stack + Caddy (Caddy via
#                                  infra/deploy/deploy-caddy.sh, NICHT von
#                                  Ansible angefasst — siehe app-Rolle).
#   wwn-mon   (10.100.100.69)  — Monitoring-Stack (Prometheus, Loki, Tempo,
#                                  Grafana). Aktuell nur common+docker durch
#                                  Ansible; Stack-Deploy ist Follow-up
#                                  (Session 11.x).
#
# Bootstrap-Hinweis: Auf wwn-prod existiert aktuell nur der User `hwr` (manuelle
# VM-Erstellung). Erster Run muss `ansible_user=hwr` setzen, damit die
# common-Rolle den deploy-User anlegen kann. Danach übernimmt der Default.
#
#     ansible-playbook -i inventories/production/hosts.yml \
#         playbooks/site.yml -e ansible_user=hwr

all:
  vars:
    ansible_user: deploy
    ansible_port: 22
    ansible_python_interpreter: /usr/bin/python3
  children:
    wwn:
      children:
        app:
          hosts:
            wwn-prod:
              ansible_host: 10.100.100.70
              wwn_role: app
        mon:
          hosts:
            wwn-mon:
              ansible_host: 10.100.100.69
              wwn_role: mon

---
# Globale Defaults für alle Hosts der wwn-Gruppe.

deploy_user: deploy
deploy_user_groups: [docker]
app_dir: /opt/wwn
docker_compose_file: compose.prod.yml
image_namespace: relations4u

# Default-Versionen — werden via -e target_version=X.Y.Z im Deploy-Playbook
# überschrieben. Initial keine `latest`-Pins (siehe CLAUDE.md).
default_versions:
  backend: "0.0.0"
  frontend: "0.0.0"
  pyworkers: "0.0.0"
  cms-auth: "0.0.0"

# SSH-Hardening — Defaults, die `common` ins sshd_config-Template schreibt.
sshd_port: 22
sshd_permit_root_login: "no"
sshd_password_authentication: "no"
sshd_pubkey_authentication: "yes"

# UFW — Default-deny-Inbound, nur diese Ports offen.
ufw_allowed_ports:
  - port: 22
    proto: tcp
    comment: "SSH"
  - port: 80
    proto: tcp
    comment: "HTTP (Caddy)"
  - port: 443
    proto: tcp
    comment: "HTTPS (Caddy)"

# LAN-only Ports — erreichbar nur aus dem Manager-LAN, nicht öffentlich.
# Scrape-Ports (Prometheus → node_exporter / App-Metriken) und Grafana-UI.
monitoring_scrape_ports:
  - port: 9101
    proto: tcp
    comment: "node_exporter (LAN-only)"
  - port: 9100
    proto: tcp
    comment: "pyworkers metrics (LAN-only)"
  - port: 8080
    proto: tcp
    comment: "backend /metrics (LAN scrape; public via Caddy/TLS)"
  - port: 3000
    proto: tcp
    comment: "Grafana UI (LAN-only)"

# SOPS-File-Pfade (im Repo, nicht auf dem Server).
secrets_dir: "{{ playbook_dir }}/../../secrets/production"

# Monitoring-Stack-Konfiguration. Defaults stehen in der Rolle, hier nur das,
# was global überschreibbar ist.
monitoring_app_dir: /opt/wwn/monitoring-stack
monitoring_central_host: 10.100.100.69
monitoring_loki_port: 3100
monitoring_otlp_grpc_port: 4317
monitoring_otlp_http_port: 4318

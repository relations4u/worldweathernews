---
# Schnelles App-Update: nur die `app`-Hosts, nur die app-Rolle, mit der
# übergebenen Version. Kein common/docker-Rerun.

- name: Deploy application
  hosts: app
  become: true
  vars_prompt:
    - name: target_version
      prompt: "Version to deploy (e.g. 0.1.0)"
      private: false
  vars:
    versions:
      backend: "{{ target_version }}"
      frontend: "{{ target_version }}"
      pyworkers: "{{ target_version }}"
  roles:
    - role: app

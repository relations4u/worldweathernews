---
# Voller Setup eines Hosts: System-Bootstrap, Docker, Monitoring-Agent,
# anschließend Application-Stack auf den `app`-Hosts.
#
# Erste Ausführung auf einem Host, der noch keinen `deploy`-User kennt:
#
#     ansible-playbook -i inventories/production/hosts.yml \
#         playbooks/site.yml -e ansible_user=hwr

- name: System bootstrap and Docker
  hosts: wwn
  become: true
  roles:
    - role: common
      tags: [common]
    - role: docker
      tags: [docker]

- name: Monitoring agent on app hosts
  # wwn-mon braucht den Agent NICHT — sein eigener monitoring-stack-Promtail
  # liest dort schon Container-Logs (Self-Monitoring). Node-Metriken für
  # wwn-mon fügen wir später optional dem Stack selbst hinzu.
  hosts: app
  become: true
  roles:
    - role: monitoring-agent
      tags: [monitoring-agent]

- name: Central monitoring stack on wwn-mon
  hosts: mon
  become: true
  roles:
    - role: monitoring-stack
      tags: [monitoring-stack]

- name: Application stack on app hosts only
  hosts: app
  become: true
  vars:
    # Erlaubt `ansible-playbook site.yml --tags app -e target_version=X.Y.Z`,
    # ohne separat playbooks/deploy.yml aufrufen zu müssen. Default 0.0.0
    # heißt „bewusst kein Deploy" — Service kommt nicht hoch.
    target_version: "{{ default_versions.backend }}"
    versions:
      backend: "{{ target_version }}"
      frontend: "{{ target_version }}"
      pyworkers: "{{ target_version }}"
  roles:
    - role: app
      tags: [app]

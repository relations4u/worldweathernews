[defaults]
inventory = inventories/production/hosts.yml
roles_path = roles
host_key_checking = True
retry_files_enabled = False
forks = 5
# Output: ansible-builtin default + yaml-formatierte Tasks. Die separate
# `community.general.yaml`-Callback wurde in community.general v12 entfernt.
stdout_callback = default
callback_result_format = yaml
bin_ansible_callbacks = True
gather_timeout = 30
collections_paths = ./collections:~/.ansible/collections
deprecation_warnings = True

[ssh_connection]
pipelining = True
control_master = auto
control_persist = 10m

# Pre-commit-Hooks für worldweathernews.com
#
# Installation: `make bootstrap` ruft `pre-commit install --install-hooks`.
# Manueller Lauf: `pre-commit run --all-files`
#
# Hinweis zu Stage-Filtern:
# - Hooks mit `files:`-Pattern überspringen, wenn keine passenden Files gestaged sind.
# - `pass_filenames: false` bei Tools, die das gesamte Modul scannen (z.B. golangci-lint).

fail_fast: false

repos:
  # ─── Generic ──────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        # Multi-Document-YAML (z.B. Kubernetes-Manifeste) zulassen.
        args: ["--allow-multiple-documents"]
      - id: check-json
        exclude: |
          (?x)^(
            .*/tsconfig\.json|
            .*/tsconfig\..*\.json|
            \.vscode/.*\.json|
            .*\.code-workspace
          )$
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ─── Secrets-Scanning ─────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ─── SOPS-encrypted secrets gate ──────────────────────────────────────────
  # Verhindert versehentliches Committen unverschlüsselter Files unter
  # infra/secrets/. Ergänzt gitleaks: gitleaks fängt Secret-Patterns ab,
  # dieser Hook fängt das *Format* (encrypted vs. plain) zusätzlich ab.
  - repo: local
    hooks:
      - id: forbid-unencrypted-secrets
        name: Forbid unencrypted secrets
        entry: scripts/check-encrypted-secrets.sh
        language: script
        files: ^infra/secrets/.*\.(env|ya?ml|json)$
        pass_filenames: true

  # ─── Go ───────────────────────────────────────────────────────────────────
  # gofmt + goimports kommen aus dem golangci-lint-Hook (run-Linters enthalten
  # `gofmt` und `goimports`). Separate Hooks würden doppelt laufen.
  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: bash -c 'command -v golangci-lint >/dev/null || { echo "  (golangci-lint nicht im PATH, übersprungen)"; exit 0; }; cd "$(git rev-parse --show-toplevel)/apps/backend" && golangci-lint run ./...'
        language: system
        files: ^apps/backend/.*\.go$
        pass_filenames: false

  # ─── Python ───────────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # ─── YAML ─────────────────────────────────────────────────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint"]

  # ─── Dockerfiles ──────────────────────────────────────────────────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        files: (?i)(^|/)(Dockerfile|.*\.dockerfile)$

  # ─── Prettier ─────────────────────────────────────────────────────────────
  # Nutzt prettier + Plugins aus apps/frontend/node_modules. Damit Plugins
  # via Node-Module-Resolution gefunden werden, läuft prettier mit cwd
  # apps/frontend/. Die von pre-commit Repo-relativ übergebenen Pfade
  # werden beim Aufruf in apps/frontend-relative Pfade umgerechnet (../../$f).
  # Plugin-Versionen werden zentral in apps/frontend/package.json verwaltet.
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: system
        entry: |
          bash -c '
            root="$(git rev-parse --show-toplevel)"
            cd "$root/apps/frontend"
            args=()
            for f in "$@"; do args+=("../../$f"); done
            exec ./node_modules/.bin/prettier --write --ignore-unknown "${args[@]}"
          ' --
        pass_filenames: true
        files: \.(js|ts|svelte|css|html|json|md|ya?ml)$
        exclude: |
          (?x)^(
            .*/node_modules/|
            .*/\.svelte-kit/|
            .*/build/|
            .*/dist/|
            pnpm-lock\.yaml|
            apps/pyworkers/uv\.lock|
            .*\.gen\.(go|ts)
          )$

extends:
  - "@commitlint/config-conventional"
rules:
  type-enum:
    - 2
    - always
    - [feat, fix, chore, docs, refactor, test, perf, ci, style, build, revert]
  # scope-enum bewusst disabled: in Mono-Repo mit Iterations-Branches
  # tauchen sinnvolle Scopes auf wie `(2.1)`, `(2.2)`, `(db)`, `(test)` —
  # eine starre Allow-List ist zu eng. Type-enum (feat/fix/chore/...) reicht
  # als Disziplin-Anker. wagoid-Action behandelt Level-1-Warnings als
  # Failure trotz failOnWarnings:false.
  scope-enum: [0]
  # subject-case bewusst disabled: Proper Nouns wie "Open-Meteo-Worker"
  # oder "WeatherCard" sind in Subjects legitim und werden vom
  # config-conventional-Default als start-case verboten.
  subject-case: [0]
  # Body- und Footer-Lines werden bewusst nicht auf 100 chars limitiert.
  # Wir nutzen multi-`-m`-Flags für strukturierte Commit-Messages mit
  # bewusst lang gehaltenen Absatz-Zeilen, die GitHub-Web und `gh pr view`
  # eh re-wrappen. Das default 100-char-Limit aus config-conventional ist
  # für Setups gedacht, in denen `git log` raw im Terminal gelesen wird.
  body-max-line-length: [0]
  footer-max-line-length: [0]
  # Header-Length auf 100 Zeichen — config-conventional default ist 72,
  # was bei zweisprachigen Subjects mit Scope schnell knapp wird
  # (z. B. "feat(db): erste Migration für Open-Meteo Locations + ...").
  header-max-length: [2, "always", 100]

# Tool-Versionen für worldweathernews.com
#
# Installation: `mise install` (siehe README.md).
#
# Hinweis zu nicht-direkt-unterstützten Tools:
# - `sqlc` und `goose` werden über das `ubi:`-Backend installiert (universelles
#   Binary-Install via mise, plattform-übergreifend von GitHub-Releases).
# - Falls `ubi:` auf einem System nicht greift, Fallback per `go install`:
#     go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
#     go install github.com/pressly/goose/v3/cmd/goose@latest
# - `task` (go-task) wird unter dem mise-Plugin-Namen `task` geführt.
# - `pre-commit` kommt über das `pipx:`-Backend (Python-Tool, isolierte venv pro Tool).
#   Fallback: `uv tool install pre-commit` oder `pipx install pre-commit`.

[tools]
go = "1.25.10"
node = "22"
python = "3.12"
pnpm = "9"
uv = "latest"
golangci-lint = "2.12.1"
"ubi:sqlc-dev/sqlc" = "1.27.0"
"ubi:pressly/goose" = "3.22.1"
task = "latest"
"pipx:pre-commit" = "4.0.1"
"pipx:yamllint" = "1.35.1"

# Session 11: Deployment-Toolchain.
# `age`/`age-keygen` werden weiterhin als System-Pakete vorausgesetzt
# (`apt install age` bzw. brew). SOPS, Ansible und Terraform via mise.
terraform = "1.15"
"ubi:getsops/sops" = "3.12"
"pipx:ansible-core" = "2.20"
"pipx:ansible-lint" = "26.4"

[settings]
experimental = true

# golangci-lint v2 Konfiguration.
#
# Pragmatik:
# - Standard-Korrektheit: errcheck, govet, staticcheck, ineffassign, unused
# - Resource-Leaks: bodyclose, sqlclosecheck
# - Style: revive, misspell
# - Sicherheit: gosec
# - Modern Error-Handling: errorlint
#
# gofmt + goimports sind in v2 als formatters separat geführt.
#
# Tests dürfen pragmatisch sein (Test-Setups verwenden manchmal nicht-konstante
# Strings für SQL oder dynamische Pfade — gosec würde dort false positives produzieren).

version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - gosec
    - misspell
    - ineffassign
    - unused
    - bodyclose
    - sqlclosecheck
    - errorlint
  settings:
    misspell:
      locale: US
      ignore-rules:
        - Konfiguration
        - Konfig
        - Verbindungs
        - Standardmäßig
  exclusions:
    paths:
      # Generierte Files aus packages/api-schema (oapi-codegen).
      - 'apps/backend/internal/api/.*\.gen\.go$'
    rules:
      - path: '_test\.go'
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - 'apps/backend/internal/api/.*\.gen\.go$'
